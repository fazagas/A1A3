<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои документы UAS</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:30px;
    text-align:center;
}
.card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}
iframe{
    width:100%;
    height:700px;
    border:none;
    margin-top:20px;
}
button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#0066cc;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<h2>Документы оператора БПЛА</h2>

<button onclick="showDoc('potwierdzenie_rejestracji_operatora.pdf')">
Регистрация оператора
</button>

<button onclick="showDoc('potwierdzenie_zdania_egzaminu_A1A3.pdf')">
Сертификат A1/A3
</button>

<iframe id="viewer"></iframe>

</div>

<script>
function showDoc(file){
    document.getElementById("viewer").src=file;
}
</script>

</body>
</html>
