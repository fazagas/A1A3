<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Сертификаты UAS</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eceff1;
}
header{
    background:#0d47a1;
    color:#fff;
    padding:18px;
    text-align:center;
}
.menu{
    text-align:center;
    padding:15px;
}
button{
    padding:12px 20px;
    margin:8px;
    border:none;
    border-radius:8px;
    background:#1565c0;
    color:white;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#0d47a1;
}
iframe{
    width:100%;
    height:88vh;
    border:none;
}
</style>

</head>
<body>

<header>
<h2>Документы оператора БПЛА</h2>
</header>

<div class="menu">

<button onclick="openPDF('potwierdzenie_rejestracji_operatora.pdf')">
Регистрация оператора
</button>

<button onclick="openPDF('potwierdzenie_zdania_egzaminu_A1A3.pdf')">
Сертификат A1/A3
</button>

</div>

<iframe id="viewer"></iframe>

<script>
function openPDF(file){
    document.getElementById("viewer").src=file + "#toolbar=0&navpanes=0";
}
</script>

</body>
</html>
